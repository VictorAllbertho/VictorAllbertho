<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="#080C14"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#12192A" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#12192A" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#12192A" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#12192A" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#12192A" stroke-width="0.5"/>

  <line x1="100" y1="0" x2="100" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="500" y1="0" x2="500" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="700" y1="0" x2="700" y2="220" stroke="#12192A" stroke-width="0.5"/>
  <line x1="800" y1="0" x2="800" y2="220" stroke="#12192A" stroke-width="0.5"/>

  <!-- Gold accent left bar -->
  <rect x="0" y="0" width="4" height="220" fill="#C9A84C"/>

  <!-- Top-left prompt label -->
  <text x="22" y="38" class="mono" font-size="11" fill="#3A4A6A" font-weight="400">~/VictorAllbertho</text>
  <text x="176" y="38" class="mono" font-size="11" fill="#C9A84C" font-weight="400"> on</text>
  <text x="200" y="38" class="mono" font-size="11" fill="#5DCAA5" font-weight="400"> main</text>

  <!-- Main name -->
  <text x="22" y="90" class="mono" font-size="42" fill="#C9A84C" font-weight="700" letter-spacing="-1">VICTOR ALLBERTHO</text>

  <!-- Separator line -->
  <line x1="22" y1="103" x2="620" y2="103" stroke="#C9A84C" stroke-width="0.75" opacity="0.4"/>

  <!-- Subtitle line -->
  <text x="22" y="130" class="mono" font-size="14" fill="#8A9BB5" font-weight="400">Fiscal Automation Engineer</text>
  <text x="260" y="130" class="mono" font-size="14" fill="#3A4A6A" font-weight="400">  //  </text>
  <text x="302" y="130" class="mono" font-size="14" fill="#8A9BB5" font-weight="400">Viber Coder</text>
  <text x="400" y="130" class="mono" font-size="14" fill="#3A4A6A" font-weight="400">  //  </text>
  <text x="442" y="130" class="mono" font-size="14" fill="#8A9BB5" font-weight="400">SaaS Builder</text>

  <!-- Tags row -->
  <!-- NF-e tag -->
  <rect x="22" y="148" width="52" height="22" rx="3" fill="#0D1825" stroke="#C9A84C" stroke-width="0.75"/>
  <text x="48" y="163" class="mono" font-size="11" fill="#C9A84C" text-anchor="middle" font-weight="700">NF-e</text>

  <!-- CT-e tag -->
  <rect x="82" y="148" width="50" height="22" rx="3" fill="#0D1825" stroke="#3A4A6A" stroke-width="0.75"/>
  <text x="107" y="163" class="mono" font-size="11" fill="#8A9BB5" text-anchor="middle">CT-e</text>

  <!-- SEFAZ tag -->
  <rect x="140" y="148" width="60" height="22" rx="3" fill="#0D1825" stroke="#3A4A6A" stroke-width="0.75"/>
  <text x="170" y="163" class="mono" font-size="11" fill="#8A9BB5" text-anchor="middle">SEFAZ</text>

  <!-- PHP tag -->
  <rect x="208" y="148" width="46" height="22" rx="3" fill="#0D1825" stroke="#3A4A6A" stroke-width="0.75"/>
  <text x="231" y="163" class="mono" font-size="11" fill="#8A9BB5" text-anchor="middle">PHP</text>

  <!-- Python tag -->
  <rect x="262" y="148" width="64" height="22" rx="3" fill="#0D1825" stroke="#3A4A6A" stroke-width="0.75"/>
  <text x="294" y="163" class="mono" font-size="11" fill="#8A9BB5" text-anchor="middle">Python</text>

  <!-- n8n tag -->
  <rect x="334" y="148" width="44" height="22" rx="3" fill="#0D1825" stroke="#3A4A6A" stroke-width="0.75"/>
  <text x="356" y="163" class="mono" font-size="11" fill="#8A9BB5" text-anchor="middle">n8n</text>

  <!-- Claude AI tag -->
  <rect x="386" y="148" width="76" height="22" rx="3" fill="#0D1825" stroke="#3A4A6A" stroke-width="0.75"/>
  <text x="424" y="163" class="mono" font-size="11" fill="#8A9BB5" text-anchor="middle">Claude AI</text>

  <!-- Brazil tag (gold) -->
  <rect x="470" y="148" width="68" height="22" rx="3" fill="#0D1825" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="504" y="163" class="mono" font-size="11" fill="#5DCAA5" text-anchor="middle">Brasil 🇧🇷</text>

  <!-- Bottom status line -->
  <text x="22" y="200" class="mono" font-size="11" fill="#3A4A6A">❯</text>
  <text x="34" y="200" class="mono" font-size="11" fill="#5DCAA5">building</text>
  <text x="98" y="200" class="mono" font-size="11" fill="#8A9BB5"> nfe-saas</text>
  <text x="188" y="200" class="mono" font-size="11" fill="#3A4A6A"> on railway</text>
  <text x="288" y="200" class="mono" font-size="11" fill="#3A4A6A">  ·  </text>
  <text x="308" y="200" class="mono" font-size="11" fill="#5DCAA5">status:</text>
  <text x="362" y="200" class="mono" font-size="11" fill="#C9A84C"> in production</text>

  <!-- Blinking cursor block -->
  <rect x="472" y="189" width="8" height="13" fill="#C9A84C" opacity="0.8"/>

  <!-- Corner decoration top-right -->
  <text x="860" y="30" class="mono" font-size="11" fill="#3A4A6A" text-anchor="end">v1.0.0</text>
  <text x="860" y="48" class="mono" font-size="11" fill="#3A4A6A" text-anchor="end">ES · BR</text>
</svg>
